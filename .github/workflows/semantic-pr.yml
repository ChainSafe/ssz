name: "Semantic PR"

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate release PR branch
        if: "startsWith(github.event.pull_request.title, 'chore: release ')"
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ "$HEAD_REF" != "release-please--branches--master" ]]; then
            echo "::error::Release PRs must use the release-please--branches--master branch so release-please can tag them after merge."
            exit 1
          fi

      - uses: amannn/action-semantic-pull-request@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            chore
            revert
