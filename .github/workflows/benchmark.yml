name: Benchmark

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - benchmark # For debugging
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    # Don't run on forks. Forks don't have access to the S3 credentials and the workflow will fail
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    strategy:
      # A regression in one shard must not cancel the signal from the others
      fail-fast: false
      matrix:
        include:
          # Shards are balanced by measured runtime, not package boundaries.
          # A threshold regression fails the shard's job; PR comments are disabled
          # (--skipPostComment) because @chainsafe/benchmark posts all shards under one
          # fixed comment tag and they would overwrite each other.
          - name: ssz
            files: "'packages/ssz/test/perf/**/*.test.ts' --ignore 'packages/ssz/test/perf/eth2/**'"
          - name: ssz-eth2-as-sha256
            files: "'packages/ssz/test/perf/eth2/**/*.test.ts' 'packages/as-sha256/test/perf/**/*.test.ts'"
          - name: persistent-merkle-tree
            files: "'packages/persistent-merkle-tree/test/perf/**/*.test.ts'"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: corepack enable
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          node-version: 24
      - run: pnpm i --frozen-lockfile && pnpm build && pnpm generate

      - name: Run benchmarks (${{ matrix.name }})
        run: pnpm benchmark:files ${{ matrix.files }} --skipPostComment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # benchmark options
          BENCHMARK_S3: true
          # S3 credentials
          S3_ACCESS_KEY: ${{ secrets.S3_BENCH_LODESTAR_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_BENCH_LODESTAR_SECRET_KEY }}
          S3_REGION: ${{ secrets.S3_BENCH_LODESTAR_REGION }}
          S3_BUCKET: ${{ secrets.S3_BENCH_LODESTAR_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_BENCH_LODESTAR_ENDPOINT }}
          # Key prefix to separate benchmark data from multiple repositories.
          # Per-shard suffix keeps each shard's history file independent (no shared
          # cache entry to corrupt, comparisons stay per-shard).
          S3_KEY_PREFIX: ${{ github.repository }}/${{ runner.os }}/${{ matrix.name }}
